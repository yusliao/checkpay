services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: checkpay-postgres
    environment:
      POSTGRES_DB: checkpay
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d checkpay"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network


  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: checkpay-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # CheckPay Web 应用
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkpay-web
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # 数据库
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=checkpay;Username=admin;Password=${DB_PASSWORD:-admin123}"

      # MinIO 存储（容器内部网络访问 minio 服务）
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      Minio__BucketName: ${MINIO_BUCKET_NAME:-checkpay-files}
      Minio__UseSSL: "false"

      Ocr__MaxRetries: ${OCR_MAX_RETRIES:-3}
      Ocr__RetryDelayMs: ${OCR_RETRY_DELAY_MS:-3000}
      Ocr__AmountValidation__Enabled: ${OCR_AMOUNT_VALIDATION_ENABLED:-true}
      Ocr__AmountValidation__TriggerConfidenceThreshold: ${OCR_AMOUNT_VALIDATION_TRIGGER_CONFIDENCE_THRESHOLD:-0.85}
      Ocr__AmountValidation__FailOpen: ${OCR_AMOUNT_VALIDATION_FAIL_OPEN:-true}
      Ocr__PrebuiltCheck__EnrichPrimaryResult: ${OCR_PREBUILT_CHECK_ENRICH_PRIMARY_RESULT:-false}
      Ocr__Training__AutoSampleOnCheckSubmit: ${OCR_TRAINING_AUTO_SAMPLE_ON_CHECK_SUBMIT:-true}
      Ocr__Training__AutoSampleRequireDiff: ${OCR_TRAINING_AUTO_SAMPLE_REQUIRE_DIFF:-true}
      Ocr__Training__AutoSampleDedupByOcrResultId: ${OCR_TRAINING_AUTO_SAMPLE_DEDUP_BY_OCR_RESULT_ID:-true}
      Ocr__Training__AutoSampleLogVerbosity: ${OCR_TRAINING_AUTO_SAMPLE_LOG_VERBOSITY:-Minimal}
      Ocr__CheckAzureTrainingCorrectionEnabled: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_ENABLED:-true}
      Ocr__CheckAzureTrainingCorrectionMaxScan: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_MAX_SCAN:-40}
      Ocr__CheckAzureTrainingCorrectionPoolTake: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_POOL_TAKE:-80}
      Ocr__CheckAzureTrainingCorrectionMode: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_MODE:-Similarity}
      Ocr__CheckAzureTrainingCorrectionMinSimilarity: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_MIN_SIMILARITY:-0.80}
      Ocr__CheckAzureTrainingCorrectionSimilarityMaxFieldConfidence: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_SIMILARITY_MAX_FIELD_CONFIDENCE:-0.62}
      Ocr__CheckAzureTrainingCorrectionClusterMinSamples: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_CLUSTER_MIN_SAMPLES:-1}
      Ocr__CheckAzureTrainingCorrectionSampleMinAgeMinutes: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_SAMPLE_MIN_AGE_MINUTES:-0}
      Ocr__CheckAzureTrainingCorrectionRequireTemplateMatch: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_REQUIRE_TEMPLATE_MATCH:-true}
      Ocr__CheckAzureTrainingCorrectionSummaryEnabled: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_SUMMARY_ENABLED:-true}
      Ocr__CheckAzureTrainingCorrectionSummaryFlushMinutes: ${OCR_CHECK_AZURE_TRAINING_CORRECTION_SUMMARY_FLUSH_MINUTES:-15}

      # Azure：Vision Read（主 OCR）+ 可选 Document Intelligence（手写金额校验，与 Vision 可非同一张 Key）
      Azure__DocumentIntelligence__Endpoint: ${AZURE_VISION_ENDPOINT:-}
      Azure__DocumentIntelligence__ApiKey: ${AZURE_VISION_API_KEY:-}
      Azure__DocumentIntelligence__DocumentAnalysisEndpoint: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      Azure__DocumentIntelligence__DocumentAnalysisApiKey: ${AZURE_DOCUMENT_INTELLIGENCE_API_KEY:-}

    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  minio_data:

networks:
  app-network:
    driver: bridge
