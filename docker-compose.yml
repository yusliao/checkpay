services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: checkpay-postgres
    environment:
      POSTGRES_DB: checkpay
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d checkpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: checkpay-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CheckPay Web 应用
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkpay-web
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # 数据库
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=checkpay;Username=admin;Password=${DB_PASSWORD:-admin123}"

      # MinIO 存储（容器内部网络访问 minio 服务）
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      Minio__BucketName: ${MINIO_BUCKET_NAME:-checkpay-files}
      Minio__UseSSL: "false"

      # 腾讯混元 OCR（主引擎，留空则使用 Mock）
      Hunyuan__SecretId: ${HUNYUAN_SECRET_ID:-}
      Hunyuan__SecretKey: ${HUNYUAN_SECRET_KEY:-}
      Hunyuan__Region: ${HUNYUAN_REGION:-ap-guangzhou}
      Ocr__Model: ${OCR_MODEL:-hunyuan-vision}
      Ocr__MaxRetries: ${OCR_MAX_RETRIES:-3}
      Ocr__RetryDelayMs: ${OCR_RETRY_DELAY_MS:-3000}

      # Azure AI Vision OCR（对比引擎，留空则跳过）
      Azure__DocumentIntelligence__Endpoint: ${AZURE_VISION_ENDPOINT:-}
      Azure__DocumentIntelligence__ApiKey: ${AZURE_VISION_API_KEY:-}

    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    # Windows Docker Desktop DNS 解析问题修复
    extra_hosts:
      - "minio:host-gateway"

volumes:
  postgres_data:
  minio_data:
